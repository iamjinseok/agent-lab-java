<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Soc Ops — Social Bingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}"/>
    <style>
        body { font-family: var(--font-body); color: rgba(255,255,255,0.85); }
        .tile-base:active { filter: brightness(1.25); }
    </style>
</head>
<body class="h-full">

<!-- ============================================================= -->
<!--  LOBBY — visible before a game starts                          -->
<!-- ============================================================= -->
<div id="lobbyView" class="flex flex-col items-center justify-center min-h-full lobby-bg">
    <div class="lobby-layout">

        <!-- ── Hero: value statement + CTA ─────────────────── -->
        <div class="lobby-hero">
            <div class="lobby-emoji">🌈</div>
            <h1 class="rainbow-text lobby-title">Soc Ops</h1>
            <p class="lobby-sub">Social Icebreaker</p>
            <p class="lobby-tagline">Find someone who matches each square or item.<br>Then celebrate together!</p>
            <div class="lobby-cta-wrap">
                <button onclick="launchBingoGame()" class="btn-rainbow font-semibold rounded-lg lobby-cta-btn">
                    🎲 Bingo
                </button>
                <button onclick="launchScavengerHuntGame()" class="btn-rainbow font-semibold rounded-lg lobby-cta-btn">
                    📋 Scavenger Hunt
                </button>
            </div>
        </div>

        <!-- ── Decorative mini board teaser (non-interactive) ── -->
        <div class="teaser-wrap" aria-hidden="true">
            <span class="teaser-label">sneak peek</span>
            <div id="teaserBoard" class="teaser-grid"></div>
        </div>

    </div>
</div>

<!-- ============================================================= -->
<!--  ACTIVE GAME — board, header, optional bingo banner            -->
<!-- ============================================================= -->
<div id="activeView" class="flex flex-col min-h-full" style="display:none">

    <!-- top bar -->
    <header class="flex items-center justify-between p-3 rainbow-header">
        <button onclick="retreatToLobby()"
                class="btn-ghost text-sm px-3 py-1\.5">
            &#8592; Back
        </button>
        <h1 class="rainbow-text" style="font-family:var(--font-display); font-size:1.25rem;">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- hint -->
    <p class="text-center text-ghost-dim text-sm py-2 px-4">
        Tap a square when you find someone who matches it.
    </p>

    <!-- bingo banner (hidden until victory) -->
    <div id="bingoBanner"
         class="rainbow-banner text-center py-2 font-semibold"
         style="display:none">
        🎉 BINGO! You got a line!
    </div>

    <!-- the 5×5 grid -->
    <div class="flex-1 flex items-center justify-center p-3">
        <div id="gridContainer"
             class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
            <!-- tiles injected by JS -->
        </div>
    </div>
</div>

<!-- ============================================================= -->
<!--  SCAVENGER HUNT VIEW — checklist + progress                   -->
<!-- ============================================================= -->
<div id="scavengerView" class="flex flex-col min-h-full" style="display:none">

    <!-- top bar -->
    <header class="flex items-center justify-between p-3 rainbow-header">
        <button onclick="retreatToLobby()"
                class="btn-ghost text-sm px-3 py-1\.5">
            &#8592; Back
        </button>
        <h1 class="rainbow-text" style="font-family:var(--font-display); font-size:1.25rem;">Scavenger Hunt</h1>
        <div class="w-16"></div>
    </header>

    <!-- progress section -->
    <div class="p-4">
        <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-semibold text-ghost">Progress</span>
            <span id="progressCounter" class="text-sm font-bold text-ghost-dim">0 / 24</span>
        </div>
        <div id="progressBarContainer" class="w-full bg-gray-800 rounded-full h-3 overflow-hidden border border-gray-700">
            <div id="progressBar" class="progress-bar-fill h-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <!-- checklist -->
    <div class="flex-1 overflow-y-auto px-4 pb-4">
        <div id="checklistContainer" class="space-y-2">
            <!-- checklist items injected by JS -->
        </div>
    </div>
</div>

<!-- ============================================================= -->
<!--  VICTORY MODAL — overlays the board                            -->
<!-- ============================================================= -->
<div id="victoryOverlay"
     class="fixed inset-0 flex items-center justify-center p-4 z-50"
     style="display:none; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);">
    <div class="victory-modal rounded-xl p-8 max-w-xs w-full text-center">
        <div style="font-size:3.5rem; margin-bottom:0.75rem;">🌈</div>
        <h2 id="victoryTitle" class="rainbow-text mb-2" style="font-family:var(--font-display); font-size:2.5rem;">BINGO!</h2>
        <p id="victoryMessage" class="text-ghost mb-6" style="font-size:0.95rem;">You completed a line!</p>
        <button onclick="dismissVictoryModal()"
                class="w-full btn-rainbow font-semibold py-3 px-6 rounded-lg">
            🎯 Keep Playing
        </button>
    </div>
</div>

<!-- ============================================================= -->
<!--  Client-side game engine                                       -->
<!-- ============================================================= -->
<script>
(function () {
    "use strict";

    var SIDE = 5;
    var TOTAL_CELLS = SIDE * SIDE;
    var TOTAL_HUNT_ITEMS = 24;
    var PERSIST_KEY_BINGO = "socops-bingo-snapshot";
    var PERSIST_KEY_HUNT = "socops-scavenger-snapshot";

    /* ── state ────────────────────────────────────────────────── */
    var gameMode = "NONE";              /* BINGO | SCAVENGER | NONE */
    var currentPhase = "LOBBY";         /* LOBBY | ACTIVE | VICTORY */
    var modalShown  = false;

    /* Bingo state */
    var liveTiles   = [];               /* Array of BingoCell objects */
    var streakFound = null;             /* WinningStreak or null */

    /* Scavenger hunt state */
    var scavengerItems = [];            /* Array of {id, prompt, checked} */
    var scavengerProgress = 0;          /* Number of checked items */

    /* ── DOM refs ─────────────────────────────────────────────── */
    var lobbyDiv       = document.getElementById("lobbyView");
    var activeDiv      = document.getElementById("activeView");
    var scavengerDiv   = document.getElementById("scavengerView");
    var gridDiv        = document.getElementById("gridContainer");
    var bannerDiv      = document.getElementById("bingoBanner");
    var overlayDiv     = document.getElementById("victoryOverlay");
    var checklistDiv   = document.getElementById("checklistContainer");
    var progressBar    = document.getElementById("progressBar");
    var progressCounter = document.getElementById("progressCounter");
    var victoryTitle   = document.getElementById("victoryTitle");
    var victoryMessage = document.getElementById("victoryMessage");

    /* ── view display helpers ─────────────────────────────────── */
    function setDisplayStyle(elem, show) {
        elem.style.display = show ? "" : "none";
    }

    function showPhase(phase) {
        currentPhase = phase;
        var isLobby = (phase === "LOBBY");
        var isBingo = (gameMode === "BINGO" && phase !== "LOBBY");
        var isHunt = (gameMode === "SCAVENGER" && phase !== "LOBBY");

        setDisplayStyle(lobbyDiv, isLobby);
        setDisplayStyle(activeDiv, isBingo);
        setDisplayStyle(scavengerDiv, isHunt);
        setDisplayStyle(bannerDiv, streakFound && gameMode === "BINGO");
        setDisplayStyle(overlayDiv, modalShown);
    }

    /* ── BINGO LOGIC ──────────────────────────────────────────── */

    function paintGrid() {
        gridDiv.innerHTML = "";
        var winIds = streakFound ? gatherStreakIds(streakFound) : {};

        for (var t = 0; t < liveTiles.length; t++) {
            var tile = liveTiles[t];
            var btn = document.createElement("button");

            /* row-based tint (0-4) */
            var row = Math.floor(t / 5);
            var rowClass = "tile-r" + row;

            var base = "tile-base relative flex items-center justify-center p-1 text-center " +
                       "border rounded transition-all duration-150 " +
                       "select-none min-h-[60px] text-xs leading-tight ";

            var stateClass;
            if (tile.selected) {
                stateClass = winIds[tile.id] ? "tile-win" : "tile-selected";
            } else {
                stateClass = rowClass;
            }

            var extra = tile.freeCell ? " font-bold text-sm" : "";
            btn.className = base + stateClass + extra;

            if (tile.freeCell) { btn.disabled = true; }
            btn.setAttribute("aria-pressed", String(tile.selected));
            btn.setAttribute("aria-label", tile.freeCell ? "Free space" : tile.prompt);

            /* inner label */
            var labelSpan = document.createElement("span");
            labelSpan.className = "wrap-break-word hyphens-auto";
            labelSpan.textContent = tile.prompt;
            btn.appendChild(labelSpan);

            /* check-mark for marked non-free tiles */
            if (tile.selected && !tile.freeCell) {
                var tick = document.createElement("span");
                tick.className = "absolute top-0.5 right-0.5 text-green-600 text-xs";
                tick.textContent = "\u2713";
                btn.appendChild(tick);
            }

            /* click handler (closure over tile id) */
            btn.addEventListener("click", (function (cid) {
                return function () { onTileTapped(cid); };
            })(tile.id));

            gridDiv.appendChild(btn);
        }
    }

    function onTileTapped(cellId) {
        liveTiles = flipTile(liveTiles, cellId);

        if (!streakFound) {
            streakFound = scanForStreak(liveTiles);
            if (streakFound) {
                triggerVictory("BINGO");
            }
        }
        persistSnapshot();
        paintGrid();
        setDisplayStyle(bannerDiv, !!streakFound);
        setDisplayStyle(overlayDiv, modalShown);
    }

    function triggerVictory(mode) {
        currentPhase = "VICTORY";
        modalShown = true;
        if (mode === "BINGO") {
            victoryTitle.textContent = "BINGO!";
            victoryMessage.textContent = "You completed a line!";
        } else if (mode === "SCAVENGER") {
            victoryTitle.textContent = "COMPLETE!";
            victoryMessage.textContent = "You found everyone!";
        }
        overlayDiv.style.display = "";
    }

    function flipTile(board, cellId) {
        return board.map(function (c) {
            if (c.id === cellId && !c.freeCell) {
                return { id: c.id, prompt: c.prompt, selected: !c.selected, freeCell: false };
            }
            return c;
        });
    }

    function scanForStreak(board) {
        var r, c, positions, i;

        /* rows */
        for (r = 0; r < SIDE; r++) {
            positions = [];
            for (c = 0; c < SIDE; c++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "row", index: r, cellPositions: positions };
            }
        }

        /* columns */
        for (c = 0; c < SIDE; c++) {
            positions = [];
            for (r = 0; r < SIDE; r++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "column", index: c, cellPositions: positions };
            }
        }

        /* main diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + i); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 0, cellPositions: positions };
        }

        /* anti diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + (SIDE - 1 - i)); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 1, cellPositions: positions };
        }

        return null;
    }

    function lineComplete(board, positions) {
        for (var k = 0; k < positions.length; k++) {
            if (!board[positions[k]].selected) { return false; }
        }
        return true;
    }

    function gatherStreakIds(streak) {
        var lookup = {};
        for (var j = 0; j < streak.cellPositions.length; j++) {
            lookup[streak.cellPositions[j]] = true;
        }
        return lookup;
    }

    /* ── SCAVENGER HUNT LOGIC ─────────────────────────────────── */

    function paintChecklist() {
        checklistDiv.innerHTML = "";
        for (var i = 0; i < scavengerItems.length; i++) {
            var item = scavengerItems[i];
            var itemDiv = document.createElement("div");
            itemDiv.className = "checklist-item";
            if (item.checked) {
                itemDiv.classList.add("checklist-item-checked");
            }

            var checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "checklist-checkbox";
            checkbox.checked = item.checked;
            checkbox.setAttribute("aria-label", item.prompt);
            
            checkbox.addEventListener("change", (function (idx) {
                return function () { onChecklistItemToggled(idx); };
            })(i));

            var label = document.createElement("label");
            label.className = "checklist-label";
            label.textContent = item.prompt;

            itemDiv.appendChild(checkbox);
            itemDiv.appendChild(label);
            checklistDiv.appendChild(itemDiv);
        }
    }

    function calculateScavengerProgress() {
        var count = 0;
        for (var i = 0; i < scavengerItems.length; i++) {
            if (scavengerItems[i].checked) { count++; }
        }
        return count;
    }

    function onChecklistItemToggled(itemIndex) {
        scavengerItems[itemIndex].checked = !scavengerItems[itemIndex].checked;
        scavengerProgress = calculateScavengerProgress();
        updateProgressBar();

        if (scavengerProgress === TOTAL_HUNT_ITEMS) {
            triggerVictory("SCAVENGER");
        }

        persistSnapshot();
        paintChecklist();
    }

    function updateProgressBar() {
        var percent = (scavengerProgress / TOTAL_HUNT_ITEMS) * 100;
        progressBar.style.width = percent + "%";
        progressCounter.textContent = scavengerProgress + " / " + TOTAL_HUNT_ITEMS;
    }

    /* ── localStorage persistence ─────────────────────────────── */
    function createBingoSnapshot() {
        return {
            phase: currentPhase,
            mode: "BINGO",
            tiles: liveTiles,
            streak: streakFound,
            modal: modalShown
        };
    }

    function createScavengerSnapshot() {
        return {
            phase: currentPhase,
            mode: "SCAVENGER",
            items: scavengerItems,
            progress: scavengerProgress,
            modal: modalShown
        };
    }

    function persistSnapshot() {
        try {
            var snapshot = gameMode === "BINGO" ? createBingoSnapshot() : createScavengerSnapshot();
            var key = gameMode === "BINGO" ? PERSIST_KEY_BINGO : PERSIST_KEY_HUNT;
            localStorage.setItem(key, JSON.stringify(snapshot));
        } catch (_) { /* storage full or unavailable */ }
    }

    function restoreSnapshot() {
        try {
            /* Try to restore bingo first */
            var bingoRaw = localStorage.getItem(PERSIST_KEY_BINGO);
            if (bingoRaw && !sessionStorage.getItem("scavenger-hunt-started")) {
                var bingoSnap = JSON.parse(bingoRaw);
                if (bingoSnap.tiles && bingoSnap.tiles.length === TOTAL_CELLS && bingoSnap.mode === "BINGO") {
                    gameMode = "BINGO";
                    liveTiles = bingoSnap.tiles;
                    streakFound = bingoSnap.streak || null;
                    modalShown = !!bingoSnap.modal;
                    currentPhase = bingoSnap.phase || "ACTIVE";
                    return currentPhase !== "LOBBY";
                }
            }

            /* Try to restore scavenger hunt */
            var huntRaw = localStorage.getItem(PERSIST_KEY_HUNT);
            if (huntRaw) {
                var huntSnap = JSON.parse(huntRaw);
                if (huntSnap.items && huntSnap.items.length === TOTAL_HUNT_ITEMS && huntSnap.mode === "SCAVENGER") {
                    gameMode = "SCAVENGER";
                    scavengerItems = huntSnap.items;
                    scavengerProgress = huntSnap.progress || 0;
                    modalShown = !!huntSnap.modal;
                    currentPhase = huntSnap.phase || "ACTIVE";
                    return currentPhase !== "LOBBY";
                }
            }

            return false;
        } catch (_) {
            return false;
        }
    }

    /* ── game initialization helpers ───────────────────────────── */
    function resetGameState() {
        gameMode = "NONE";
        liveTiles = [];
        scavengerItems = [];
        streakFound = null;
        scavengerProgress = 0;
        currentPhase = "LOBBY";
        modalShown = false;
    }

    function initializeGame(mode, renderFn) {
        gameMode = mode;
        modalShown = false;
        currentPhase = "ACTIVE";
        persistSnapshot();
        if (renderFn) { renderFn(); }
        showPhase("ACTIVE");
    }

    /* ── public API (called from onclick attrs) ───────────────── */
    window.launchBingoGame = function () {
        fetch("/api/bingo/fresh-board")
            .then(function (resp) { return resp.json(); })
            .then(function (cells) {
                liveTiles = cells;
                streakFound = null;
                initializeGame("BINGO", paintGrid);
            });
    };

    window.launchScavengerHuntGame = function () {
        fetch("/api/scavenger-hunt/fresh-list")
            .then(function (resp) { return resp.json(); })
            .then(function (prompts) {
                scavengerItems = prompts.map(function (prompt, idx) {
                    return { id: idx, prompt: prompt, checked: false };
                });
                scavengerProgress = 0;
                initializeGame("SCAVENGER", function () {
                    updateProgressBar();
                    paintChecklist();
                });
            });
    };

    window.retreatToLobby = function () {
        resetGameState();
        persistSnapshot();
        showPhase("LOBBY");
    };

    window.dismissVictoryModal = function () {
        modalShown = false;
        overlayDiv.style.display = "none";
        persistSnapshot();
    };

    /* ── bootstrap ────────────────────────────────────────────── */
    function bootGame() {
        if (!restoreSnapshot()) {
            showPhase("LOBBY");
            return;
        }
        if (gameMode === "BINGO") {
            paintGrid();
        } else if (gameMode === "SCAVENGER") {
            updateProgressBar();
            paintChecklist();
        }
        showPhase(currentPhase);
    }

    bootGame();
})();
</script>

<!-- ============================================================= -->
<!--  Teaser board populator (decorative only, no game state)       -->
<!-- ============================================================= -->
<script>
(function () {
    /* Diagonal win (positions 0,6,12,18,24) + a few marked cells */
    var TEASER = [
        { t: "Owns a pet 🐾",      s: "win"    },
        { t: "3+ languages",        s: ""       },
        { t: "Loves hiking",        s: "marked" },
        { t: "Morning person",      s: ""       },
        { t: "Has a twin",          s: ""       },
        { t: "Watches anime",       s: "marked" },
        { t: "Home cook",           s: "win"    },
        { t: "Plays guitar",        s: ""       },
        { t: "Vegetarian",          s: ""       },
        { t: "Loves sushi",         s: "marked" },
        { t: "Reads daily",         s: ""       },
        { t: "Has siblings",        s: ""       },
        { t: "FREE ⭐",             s: "free"   },
        { t: "Loves cats",          s: ""       },
        { t: "Gamer 🎮",            s: "marked" },
        { t: "Hates Mondays",       s: ""       },
        { t: "Night owl 🦉",        s: "marked" },
        { t: "Coffee addict",       s: ""       },
        { t: "Gym regular",         s: "win"    },
        { t: "Has a garden",        s: ""       },
        { t: "Loves travel",        s: ""       },
        { t: "Foodie 🍜",           s: ""       },
        { t: "WFH life",            s: "marked" },
        { t: "Tea person",          s: ""       },
        { t: "Music lover 🎵",      s: "win"    }
    ];

    var board = document.getElementById("teaserBoard");
    if (!board) { return; }

    TEASER.forEach(function (cell, i) {
        var div = document.createElement("div");
        var cls = "teaser-cell";
        if (cell.s === "win")    { cls += " teaser-cell-win";    }
        if (cell.s === "marked") { cls += " teaser-cell-marked"; }
        if (cell.s === "free")   { cls += " teaser-cell-free";   }
        div.className = cls;
        div.textContent = cell.t;
        /* staggered reveal: base delay 0.45 s, +25 ms per cell */
        div.style.animationDelay = (0.45 + i * 0.025) + "s";
        board.appendChild(div);
    });
})();
</script>

</body>
</html>
