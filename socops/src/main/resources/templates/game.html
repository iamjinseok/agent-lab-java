<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Soc Ops — Social Bingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}"/>
    <style>
        body { font-family: var(--font-body); color: rgba(255,255,255,0.85); }
        .tile-base:active { filter: brightness(1.25); }
    </style>
</head>
<body class="h-full">

<!-- ============================================================= -->
<!--  LOBBY — visible before a game starts                          -->
<!-- ============================================================= -->
<div id="lobbyView" class="flex flex-col items-center justify-center min-h-full lobby-bg">
    <div class="lobby-layout">

        <!-- ── Hero: value statement + CTA ─────────────────── -->
        <div class="lobby-hero">
            <div class="lobby-emoji">🌈</div>
            <h1 class="rainbow-text lobby-title">Soc Ops</h1>
            <p class="lobby-sub">Social Bingo</p>
            <p class="lobby-tagline">Find someone who matches each square.<br>Five in a row — you win!</p>
            <div class="lobby-cta-wrap">
                <button onclick="launchGame()" class="btn-rainbow font-semibold rounded-lg lobby-cta-btn">
                    ✨ Start Game
                </button>
            </div>
        </div>

        <!-- ── Decorative mini board teaser (non-interactive) ── -->
        <div class="teaser-wrap" aria-hidden="true">
            <span class="teaser-label">sneak peek</span>
            <div id="teaserBoard" class="teaser-grid"></div>
        </div>

    </div>
</div>

<!-- ============================================================= -->
<!--  ACTIVE GAME — board, header, optional bingo banner            -->
<!-- ============================================================= -->
<div id="activeView" class="flex flex-col min-h-full" style="display:none">

    <!-- top bar -->
    <header class="flex items-center justify-between p-3 rainbow-header">
        <button onclick="retreatToLobby()"
                class="btn-ghost text-sm px-3 py-1\.5">
            &#8592; Back
        </button>
        <h1 class="rainbow-text" style="font-family:var(--font-display); font-size:1.25rem;">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- hint -->
    <p class="text-center text-ghost-dim text-sm py-2 px-4">
        Tap a square when you find someone who matches it.
    </p>

    <!-- bingo banner (hidden until victory) -->
    <div id="bingoBanner"
         class="rainbow-banner text-center py-2 font-semibold"
         style="display:none">
        🎉 BINGO! You got a line!
    </div>

    <!-- the 5×5 grid -->
    <div class="flex-1 flex items-center justify-center p-3">
        <div id="gridContainer"
             class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
            <!-- tiles injected by JS -->
        </div>
    </div>
</div>

<!-- ============================================================= -->
<!--  VICTORY MODAL — overlays the board                            -->
<!-- ============================================================= -->
<div id="victoryOverlay"
     class="fixed inset-0 flex items-center justify-center p-4 z-50"
     style="display:none; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);">
    <div class="victory-modal rounded-xl p-8 max-w-xs w-full text-center">
        <div style="font-size:3.5rem; margin-bottom:0.75rem;">🌈</div>
        <h2 class="rainbow-text mb-2" style="font-family:var(--font-display); font-size:2.5rem;">BINGO!</h2>
        <p class="text-ghost mb-6" style="font-size:0.95rem;">You completed a line!</p>
        <button onclick="dismissVictoryModal()"
                class="w-full btn-rainbow font-semibold py-3 px-6 rounded-lg">
            🎯 Keep Playing
        </button>
    </div>
</div>

<!-- ============================================================= -->
<!--  Client-side game engine                                       -->
<!-- ============================================================= -->
<script>
(function () {
    "use strict";

    var SIDE = 5;
    var TOTAL_CELLS = SIDE * SIDE;
    var PERSIST_KEY = "socops-bingo-snapshot";

    /* ── state ────────────────────────────────────────────────── */
    var liveTiles   = [];          /* Array of BingoCell objects  */
    var streakFound = null;        /* WinningStreak or null       */
    var modalShown  = false;
    var currentPhase = "LOBBY";    /* LOBBY | ACTIVE | VICTORY    */

    /* ── DOM refs ─────────────────────────────────────────────── */
    var lobbyDiv   = document.getElementById("lobbyView");
    var activeDiv  = document.getElementById("activeView");
    var gridDiv    = document.getElementById("gridContainer");
    var bannerDiv  = document.getElementById("bingoBanner");
    var overlayDiv = document.getElementById("victoryOverlay");

    /* ── phase switching ──────────────────────────────────────── */
    function showPhase(phase) {
        currentPhase = phase;
        lobbyDiv.style.display   = (phase === "LOBBY") ? "" : "none";
        activeDiv.style.display  = (phase !== "LOBBY") ? "" : "none";
        bannerDiv.style.display  = (streakFound)       ? "" : "none";
        overlayDiv.style.display = (modalShown)        ? "" : "none";
    }

    /* ── board rendering ──────────────────────────────────────── */
    function paintGrid() {
        gridDiv.innerHTML = "";
        var winIds = streakFound ? gatherStreakIds(streakFound) : {};

        for (var t = 0; t < liveTiles.length; t++) {
            var tile = liveTiles[t];
            var btn = document.createElement("button");

            /* row-based tint (0-4) */
            var row = Math.floor(t / 5);
            var rowClass = "tile-r" + row;

            var base = "tile-base relative flex items-center justify-center p-1 text-center " +
                       "border rounded transition-all duration-150 " +
                       "select-none min-h-[60px] text-xs leading-tight ";

            var stateClass;
            if (tile.selected) {
                stateClass = winIds[tile.id] ? "tile-win" : "tile-selected";
            } else {
                stateClass = rowClass;
            }

            var extra = tile.freeCell ? " font-bold text-sm" : "";
            btn.className = base + stateClass + extra;

            if (tile.freeCell) { btn.disabled = true; }
            btn.setAttribute("aria-pressed", String(tile.selected));
            btn.setAttribute("aria-label", tile.freeCell ? "Free space" : tile.prompt);

            /* inner label */
            var labelSpan = document.createElement("span");
            labelSpan.className = "wrap-break-word hyphens-auto";
            labelSpan.textContent = tile.prompt;
            btn.appendChild(labelSpan);

            /* check-mark for marked non-free tiles */
            if (tile.selected && !tile.freeCell) {
                var tick = document.createElement("span");
                tick.className = "absolute top-0.5 right-0.5 text-green-600 text-xs";
                tick.textContent = "\u2713";
                btn.appendChild(tick);
            }

            /* click handler (closure over tile id) */
            btn.addEventListener("click", (function (cid) {
                return function () { onTileTapped(cid); };
            })(tile.id));

            gridDiv.appendChild(btn);
        }
    }

    /* ── tile tap logic ───────────────────────────────────────── */
    function onTileTapped(cellId) {
        liveTiles = flipTile(liveTiles, cellId);

        if (!streakFound) {
            var detected = scanForStreak(liveTiles);
            if (detected) {
                streakFound = detected;
                currentPhase = "VICTORY";
                modalShown = true;
            }
        }
        persistSnapshot();
        paintGrid();
        bannerDiv.style.display  = streakFound ? "" : "none";
        overlayDiv.style.display = modalShown  ? "" : "none";
    }

    /* ── board manipulation (mirrors BoardAssembler.java) ─────── */
    function flipTile(board, cellId) {
        return board.map(function (c) {
            if (c.id === cellId && !c.freeCell) {
                return { id: c.id, prompt: c.prompt, selected: !c.selected, freeCell: false };
            }
            return c;
        });
    }

    /* ── victory scanning (mirrors detectWinningStreak) ───────── */
    function scanForStreak(board) {
        var r, c, positions, i;

        /* rows */
        for (r = 0; r < SIDE; r++) {
            positions = [];
            for (c = 0; c < SIDE; c++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "row", index: r, cellPositions: positions };
            }
        }

        /* columns */
        for (c = 0; c < SIDE; c++) {
            positions = [];
            for (r = 0; r < SIDE; r++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "column", index: c, cellPositions: positions };
            }
        }

        /* main diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + i); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 0, cellPositions: positions };
        }

        /* anti diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + (SIDE - 1 - i)); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 1, cellPositions: positions };
        }

        return null;
    }

    function lineComplete(board, positions) {
        for (var k = 0; k < positions.length; k++) {
            if (!board[positions[k]].selected) { return false; }
        }
        return true;
    }

    function gatherStreakIds(streak) {
        var lookup = {};
        for (var j = 0; j < streak.cellPositions.length; j++) {
            lookup[streak.cellPositions[j]] = true;
        }
        return lookup;
    }

    /* ── localStorage persistence ─────────────────────────────── */
    function persistSnapshot() {
        try {
            var blob = JSON.stringify({
                phase: currentPhase,
                tiles: liveTiles,
                streak: streakFound,
                modal: modalShown
            });
            localStorage.setItem(PERSIST_KEY, blob);
        } catch (_) { /* storage full or unavailable */ }
    }

    function restoreSnapshot() {
        try {
            var raw = localStorage.getItem(PERSIST_KEY);
            if (!raw) { return false; }
            var snap = JSON.parse(raw);
            if (!snap.tiles || snap.tiles.length !== TOTAL_CELLS) { return false; }
            liveTiles   = snap.tiles;
            streakFound = snap.streak || null;
            modalShown  = !!snap.modal;
            currentPhase = snap.phase || "ACTIVE";
            return currentPhase !== "LOBBY";
        } catch (_) { return false; }
    }

    /* ── public API (called from onclick attrs) ───────────────── */
    window.launchGame = function () {
        fetch("/api/bingo/fresh-board")
            .then(function (resp) { return resp.json(); })
            .then(function (cells) {
                liveTiles   = cells;
                streakFound = null;
                modalShown  = false;
                currentPhase = "ACTIVE";
                persistSnapshot();
                paintGrid();
                showPhase("ACTIVE");
            });
    };

    window.retreatToLobby = function () {
        liveTiles   = [];
        streakFound = null;
        modalShown  = false;
        currentPhase = "LOBBY";
        persistSnapshot();
        showPhase("LOBBY");
    };

    window.dismissVictoryModal = function () {
        modalShown = false;
        overlayDiv.style.display = "none";
        persistSnapshot();
    };

    /* ── boot ─────────────────────────────────────────────────── */
    if (restoreSnapshot()) {
        paintGrid();
        showPhase(currentPhase);
    } else {
        showPhase("LOBBY");
    }
})();
</script>

<!-- ============================================================= -->
<!--  Teaser board populator (decorative only, no game state)       -->
<!-- ============================================================= -->
<script>
(function () {
    /* Diagonal win (positions 0,6,12,18,24) + a few marked cells */
    var TEASER = [
        { t: "Owns a pet 🐾",      s: "win"    },
        { t: "3+ languages",        s: ""       },
        { t: "Loves hiking",        s: "marked" },
        { t: "Morning person",      s: ""       },
        { t: "Has a twin",          s: ""       },
        { t: "Watches anime",       s: "marked" },
        { t: "Home cook",           s: "win"    },
        { t: "Plays guitar",        s: ""       },
        { t: "Vegetarian",          s: ""       },
        { t: "Loves sushi",         s: "marked" },
        { t: "Reads daily",         s: ""       },
        { t: "Has siblings",        s: ""       },
        { t: "FREE ⭐",             s: "free"   },
        { t: "Loves cats",          s: ""       },
        { t: "Gamer 🎮",            s: "marked" },
        { t: "Hates Mondays",       s: ""       },
        { t: "Night owl 🦉",        s: "marked" },
        { t: "Coffee addict",       s: ""       },
        { t: "Gym regular",         s: "win"    },
        { t: "Has a garden",        s: ""       },
        { t: "Loves travel",        s: ""       },
        { t: "Foodie 🍜",           s: ""       },
        { t: "WFH life",            s: "marked" },
        { t: "Tea person",          s: ""       },
        { t: "Music lover 🎵",      s: "win"    }
    ];

    var board = document.getElementById("teaserBoard");
    if (!board) { return; }

    TEASER.forEach(function (cell, i) {
        var div = document.createElement("div");
        var cls = "teaser-cell";
        if (cell.s === "win")    { cls += " teaser-cell-win";    }
        if (cell.s === "marked") { cls += " teaser-cell-marked"; }
        if (cell.s === "free")   { cls += " teaser-cell-free";   }
        div.className = cls;
        div.textContent = cell.t;
        /* staggered reveal: base delay 0.45 s, +25 ms per cell */
        div.style.animationDelay = (0.45 + i * 0.025) + "s";
        board.appendChild(div);
    });
})();
</script>

</body>
</html>
